<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<title>TravelFamily.AI — Application</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&family=Mulish:ital,wght@0,400;0,500;0,600;0,700;0,800;1,500&family=Caveat:wght@500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="assets/ds.css" />
<style>
  body{ background:radial-gradient(120% 90% at 0% 0%, #EAF2FF 0%, transparent 45%), radial-gradient(120% 90% at 100% 0%, #E6FBFF 0%, transparent 42%), #EDF1F7;
    min-height:100vh; display:flex; align-items:center; justify-content:center; padding:26px 16px; }
  [data-theme="dark"] body{ background:#05070E; }
  /* futuristic ambient: deep space + neon glow + subtle moving grid behind the device */
  body::before{ content:''; position:fixed; inset:0; z-index:0; pointer-events:none;
    background:
      radial-gradient(60% 50% at 18% 12%, rgba(37,99,235,.30), transparent 60%),
      radial-gradient(55% 45% at 85% 18%, rgba(6,182,212,.22), transparent 60%),
      radial-gradient(60% 55% at 80% 92%, rgba(168,85,247,.20), transparent 62%),
      #05070E; }
  body::after{ content:''; position:fixed; inset:-2px; z-index:0; pointer-events:none; opacity:.5;
    background-image:linear-gradient(rgba(120,170,255,.07) 1px, transparent 1px), linear-gradient(90deg, rgba(120,170,255,.07) 1px, transparent 1px);
    background-size:46px 46px; mask:radial-gradient(circle at 50% 40%, #000 0%, transparent 78%); animation:gridDrift 24s linear infinite; }
  @keyframes gridDrift{ to{ background-position:46px 92px; } }
  .device-frame{ z-index:1; }
  [data-theme="dark"] .device-frame{ background:#070B14; box-shadow:0 50px 110px -36px rgba(6,182,212,.28), 0 0 0 1px rgba(120,180,255,.14) inset, 0 0 0 2px rgba(10,16,30,.9); }

  .device-frame{ position:relative; width:402px; max-width:100%; background:#0B1220; border-radius:54px; padding:13px;
    box-shadow:0 50px 90px -40px rgba(15,23,42,.6), 0 0 0 2px rgba(255,255,255,.04) inset; }
  .notch{ position:absolute; top:13px; left:50%; transform:translateX(-50%); width:128px; height:30px; background:#0B1220; border-radius:0 0 18px 18px; z-index:60; }
  .phone-screen{ position:relative; background:var(--bg); border-radius:42px; overflow:hidden; height:852px; display:flex; flex-direction:column; }
  .phone-screen.is-welcome{ background:#070C16; }

  .statusbar{ display:flex; align-items:center; justify-content:space-between; padding:12px 28px 6px; font-family:var(--font-display); font-size:14px; color:var(--text); flex:none; z-index:55; }
  .is-welcome .statusbar{ color:#fff; }
  .scroll-area{ flex:1; overflow-y:auto; overflow-x:hidden; position:relative; }
  .scroll-area.no-scroll{ overflow:hidden; }
  .scroll-area::-webkit-scrollbar{ width:0; }
  .screen{ animation:fadeUp .34s ease both; padding-bottom:96px; min-height:100%; }
  .is-chat .scroll-area, .chat.screen{ padding-bottom:0; }
  .chat.screen{ display:flex; flex-direction:column; height:100%; min-height:100%; animation:none; }

  .hscroll{ display:flex; gap:14px; overflow-x:auto; padding:2px 18px 10px; scroll-snap-type:x mandatory; }
  .hscroll::-webkit-scrollbar{ height:0; }
  .hscroll > *{ scroll-snap-align:start; }

  .icon-btn{ width:44px; height:44px; border-radius:50%; border:none; background:var(--surface); color:var(--text); display:grid; place-items:center; cursor:pointer; box-shadow:var(--sh-xs); position:relative; flex:none; }
  .icon-btn.glass{ background:rgba(255,255,255,.85); backdrop-filter:blur(8px); color:var(--marine); }
  .icon-btn .dot{ position:absolute; top:9px; right:10px; width:9px; height:9px; border-radius:50%; background:var(--coral); border:2px solid var(--surface); }

  .parcours-grid{ display:grid; grid-template-columns:1fr 1fr; gap:12px; }
  .parcours-card{ position:relative; overflow:hidden; display:flex; flex-direction:column; align-items:flex-start; text-align:left;
    border:none; border-radius:var(--r-lg); padding:16px 15px 18px; cursor:pointer; color:#fff; min-height:158px;
    box-shadow:0 10px 24px -14px rgba(15,23,42,.4); transition:transform .22s cubic-bezier(.34,1.56,.64,1), box-shadow .22s ease; }
  .parcours-card.pc-ocean{ background:linear-gradient(150deg,#3B82F6 0%,#1D4ED8 100%); }
  .parcours-card.pc-coral{ background:linear-gradient(150deg,#FF8A6B 0%,#E5532E 100%); }
  .parcours-card.pc-turq{ background:linear-gradient(150deg,#22C9DD 0%,#0E8FA6 100%); }
  .parcours-card.pc-gold{ background:linear-gradient(150deg,#F1C44C 0%,#D49A1E 100%); }
  .parcours-card .pc-num{ position:absolute; top:-14px; right:-2px; font-family:var(--font-display); font-weight:800; font-size:74px; line-height:1; color:rgba(255,255,255,.16); }
  .parcours-card .pc-ic{ width:46px; height:46px; border-radius:14px; display:grid; place-items:center; background:rgba(255,255,255,.22); color:#fff; backdrop-filter:blur(4px); transition:transform .22s ease; }
  .parcours-card .pc-title{ font-family:var(--font-display); font-weight:700; font-size:15.5px; line-height:1.2; margin:13px 0 5px; position:relative; }
  .parcours-card .pc-desc{ font-size:12.5px; line-height:1.4; color:rgba(255,255,255,.86); position:relative; }
  .parcours-card .pc-go{ position:absolute; bottom:14px; right:14px; width:30px; height:30px; border-radius:50%; background:rgba(255,255,255,.22);
    display:grid; place-items:center; color:#fff; opacity:0; transform:translateX(-6px); transition:opacity .22s ease, transform .22s ease; }
  .parcours-card:hover{ transform:translateY(-5px); box-shadow:0 18px 32px -12px rgba(15,23,42,.5); }
  .parcours-card:hover .pc-ic{ transform:scale(1.08) rotate(-4deg); }
  .parcours-card:hover .pc-go{ opacity:1; transform:translateX(0); }
  .parcours-card:active{ transform:translateY(-2px) scale(.99); }

  /* ===== WELCOME ANIMATION ===== */
  .welcome{ position:relative; height:100%; overflow:hidden; display:flex; flex-direction:column; justify-content:flex-end;
    background:radial-gradient(120% 80% at 50% 18%, #16335E 0%, #0B1A33 42%, #070C16 78%); }
  .welcome-sky{ position:absolute; inset:0; background:
      radial-gradient(60% 40% at 50% 30%, rgba(37,99,235,.35), transparent 70%),
      radial-gradient(40% 30% at 70% 18%, rgba(6,182,212,.28), transparent 70%); }
  .particles{ position:absolute; inset:0; pointer-events:none; }
  .particles span{ position:absolute; bottom:-10px; width:5px; height:5px; border-radius:50%; background:rgba(173,216,255,.85);
    box-shadow:0 0 8px rgba(120,200,255,.9); animation:rise linear infinite; }
  @keyframes rise{ 0%{ transform:translateY(0) scale(.6); opacity:0; } 12%{ opacity:.9; } 100%{ transform:translateY(-560px) scale(1.1); opacity:0; } }

  .portal{ position:absolute; left:50%; top:46%; transform:translate(-50%,-50%); width:300px; height:300px; }
  .portal-glow{ position:absolute; inset:0; border-radius:50%; background:radial-gradient(circle, rgba(56,150,255,.55), rgba(6,182,212,.2) 45%, transparent 68%); filter:blur(6px); animation:glowPulse 3.2s ease-in-out infinite; }
  .portal-ring{ position:absolute; inset:0; border-radius:50%; border:2px solid transparent; }
  .portal-ring.r1{ background:conic-gradient(from 0deg, transparent, rgba(56,150,255,.9), transparent 60%) border-box; -webkit-mask:linear-gradient(#000 0 0) padding-box exclude, linear-gradient(#000 0 0); mask-composite:exclude; padding:2px; animation:spin 7s linear infinite; }
  .portal-ring.r2{ inset:26px; background:conic-gradient(from 180deg, transparent, rgba(6,182,212,.8), transparent 55%) border-box; -webkit-mask:linear-gradient(#000 0 0) padding-box exclude, linear-gradient(#000 0 0); mask-composite:exclude; padding:2px; animation:spin 5s linear infinite reverse; }
  .portal-ring.r3{ inset:54px; border:1.5px dashed rgba(170,210,255,.4); animation:spin 18s linear infinite; }
  @keyframes spin{ to{ transform:rotate(360deg); } }
  @keyframes glowPulse{ 0%,100%{ opacity:.7; transform:scale(.96); } 50%{ opacity:1; transform:scale(1.06); } }

  .emerge-wrap{ position:absolute; left:50%; bottom:170px; transform:translateX(-50%); width:300px; height:600px; display:flex; align-items:flex-end; justify-content:center; }
  .emerge-enter{ position:relative; width:300px; height:560px; opacity:0; transform:translateY(64px) scale(.9); transition:opacity 1.1s ease, transform 1.2s cubic-bezier(.2,.7,.2,1); display:flex; align-items:flex-end; justify-content:center; }
  /* live video stage (real Webbina, white background keyed out in real time) */
  .live-rawvideo{ position:absolute; left:50%; bottom:0; transform:translateX(-50%); width:560px; height:560px; object-fit:contain; border-radius:24px; transition:opacity .7s ease; }
  .live-stage{ position:relative; width:560px; height:560px; display:flex; align-items:flex-end; justify-content:center; }
  .live-canvas{ position:absolute; left:50%; bottom:0; transform:translateX(-50%); width:560px; height:560px; object-fit:contain; transition:opacity .7s ease; animation:webbinaGlow 3.6s ease-in-out infinite; }
  .waiting-portrait{ position:absolute; left:50%; bottom:0; transform:translateX(-50%); height:560px; width:auto; transition:opacity .8s ease; animation:webbinaGlow 4.2s ease-in-out infinite, waitBreath 5s ease-in-out infinite; pointer-events:none; }
  .emerge-img{ height:560px; width:auto; animation:webbinaGlow 3.6s ease-in-out infinite; }
  @keyframes webbinaGlow{ 0%,100%{ filter:drop-shadow(0 0 18px rgba(56,150,255,.42)) drop-shadow(0 16px 30px rgba(0,0,0,.5)); } 50%{ filter:drop-shadow(0 0 40px rgba(86,184,255,.85)) drop-shadow(0 16px 30px rgba(0,0,0,.5)); } }
  .emerge-base{ position:absolute; bottom:-6px; left:50%; transform:translateX(-50%); width:240px; height:42px; border-radius:50%; background:radial-gradient(circle, rgba(56,150,255,.7), transparent 70%); filter:blur(8px); opacity:0; transition:opacity 1s ease; }
  @keyframes basePulse{ 0%,100%{ transform:translateX(-50%) scale(.92); opacity:.75; } 50%{ transform:translateX(-50%) scale(1.14); opacity:1; } }
  .phase-1 .emerge-enter, .phase-2 .emerge-enter{ opacity:1; transform:translateY(0) scale(1); }
  .phase-1 .emerge-base, .phase-2 .emerge-base{ opacity:1; animation:basePulse 3.6s ease-in-out infinite; }

  /* sound affordance */
  .sound-toggle{ position:absolute; top:52px; left:50%; transform:translateX(-50%); z-index:8; display:inline-flex; align-items:center; gap:8px;
    background:rgba(255,255,255,.12); border:1px solid rgba(255,255,255,.22); -webkit-backdrop-filter:blur(10px); backdrop-filter:blur(10px); color:#fff;
    font-family:var(--font-display); font-weight:600; font-size:13.5px; padding:9px 16px; border-radius:var(--r-pill); cursor:pointer;
    opacity:0; transition:opacity .6s ease .4s; }
  .phase-2 .sound-toggle{ opacity:1; }
  .sound-toggle .sound-ping{ position:absolute; right:-3px; top:-3px; width:12px; height:12px; border-radius:50%; background:var(--turq); box-shadow:0 0 0 0 rgba(6,182,212,.6); animation:ping 1.8s ease-out infinite; }
  @keyframes ping{ 0%{ box-shadow:0 0 0 0 rgba(6,182,212,.6); } 70%,100%{ box-shadow:0 0 0 12px rgba(6,182,212,0); } }
  /* when the welcome clip has finished, Webbina settles into a calm waiting breath */
  .is-waiting .live-canvas{ animation:webbinaGlow 4.2s ease-in-out infinite, waitBreath 5s ease-in-out infinite; }
  @keyframes waitBreath{ 0%,100%{ transform:scale(1) translateY(0); } 50%{ transform:scale(1.012) translateY(-3px); } }
  .listening{ display:inline-flex; align-items:center; gap:8px; margin-top:10px; font-size:13.5px; color:var(--turq); font-family:var(--font-display); font-weight:600; }
  .listening-dots{ display:inline-flex; gap:3px; }
  .listening-dots i{ width:6px; height:6px; border-radius:50%; background:var(--turq); animation:listenDot 1.3s ease-in-out infinite; }
  .listening-dots i:nth-child(2){ animation-delay:.2s; } .listening-dots i:nth-child(3){ animation-delay:.4s; }
  @keyframes listenDot{ 0%,100%{ transform:scale(.6); opacity:.5; } 50%{ transform:scale(1); opacity:1; } }

  /* voice toggle (chat header) + tap-to-hear button */
  .voice-toggle{ display:inline-flex; align-items:center; gap:6px; flex:none; background:var(--ocean-50); color:var(--ocean-700);
    border:1px solid transparent; border-radius:var(--r-pill); padding:7px 10px; font-family:var(--font-display); font-weight:700; font-size:12px; cursor:pointer; }
  .voice-toggle:not(.on){ background:var(--slate-100); color:var(--text-muted); }
  .voice-toggle.on{ box-shadow:0 0 0 3px var(--ocean-50); }
  .speak-btn{ display:inline-flex; align-items:center; gap:5px; background:var(--ocean-50); color:var(--ocean-700); border:none;
    border-radius:var(--r-pill); padding:5px 11px; font-family:var(--font-display); font-weight:700; font-size:12px; cursor:pointer; flex:none; }
  .speak-btn.on{ background:var(--ocean); color:#fff; }

  /* Webbina avatars — alive everywhere */
  .wb-avatar{ transform-origin:50% 46%; animation:faceLive 4.4s ease-in-out infinite; will-change:transform; }
  .wb-avatar--live{ animation:faceTalk 4s ease-in-out infinite; }
  .wb-avatar--think{ animation:faceThink 2.3s ease-in-out infinite; }
  @keyframes faceLive{ 0%{ transform:scale(1); } 34%{ transform:scale(1.024); } 47%{ transform:scale(1.024) scaleY(1); } 49%{ transform:scale(1.024) scaleY(.82); } 51%{ transform:scale(1.024) scaleY(1); } 72%{ transform:scale(1); } 100%{ transform:scale(1); } }
  @keyframes faceTalk{ 0%{ transform:rotate(-1.3deg) scale(1); } 24%{ transform:rotate(1.3deg) scale(1.02); } 40%{ transform:rotate(0deg) scale(1.02) scaleY(1); } 42%{ transform:rotate(0deg) scale(1.02) scaleY(.82); } 44%{ transform:rotate(0deg) scale(1.02) scaleY(1); } 68%{ transform:rotate(-1.3deg) scale(1); } 100%{ transform:rotate(-1.3deg) scale(1); } }
  @keyframes faceThink{ 0%{ transform:rotate(-2deg); } 28%{ transform:rotate(2deg) scale(1.02); } 48%{ transform:rotate(0deg) scaleY(1); } 50%{ transform:rotate(0deg) scaleY(.8); } 52%{ transform:rotate(0deg) scaleY(1); } 72%{ transform:rotate(-1deg); } 100%{ transform:rotate(-2deg); } }
  @media (prefers-reduced-motion: reduce){ .wb-avatar,.wb-avatar--live,.wb-avatar--think,.emerge-idle,.emerge-img,.holo-scan,.emerge-base{ animation:none !important; } }

  .welcome-copy{ position:relative; z-index:5; padding:24px 24px calc(28px + env(safe-area-inset-bottom)); text-align:center; opacity:0; transform:translateY(20px); transition:opacity .7s ease, transform .7s ease; }
  .phase-2 .welcome-copy{ opacity:1; transform:translateY(0); }
  .welcome-brand{ justify-content:center; margin-bottom:14px; }
  .welcome-brand .wm{ color:#fff; font-size:19px; } .welcome-brand .wm b{ color:var(--turq); }
  .welcome-brand img{ height:34px; }
  .greet-bubble{ background:rgba(255,255,255,.1); border:1px solid rgba(255,255,255,.18); backdrop-filter:blur(10px); border-radius:var(--r-xl); padding:18px 20px; color:#fff; }
  .greet-bubble b{ font-family:var(--font-display); font-size:20px; display:block; margin-bottom:4px; }
  .greet-bubble span{ font-size:15px; color:rgba(255,255,255,.82); }
  .welcome-link{ background:none; border:none; color:rgba(255,255,255,.7); font-family:var(--font-display); font-weight:600; font-size:14px; margin-top:14px; cursor:pointer; }

  /* ===== CHAT ===== */
  .chat-head{ display:flex; align-items:center; gap:12px; padding:8px 14px 12px; border-bottom:1px solid var(--border); background:var(--surface); flex:none; }
  .online-dot{ width:8px; height:8px; border-radius:50%; background:var(--success); display:inline-block; }
  .chat-body{ flex:1; overflow-y:auto; padding:16px 14px; display:flex; flex-direction:column; gap:12px; background:var(--surface-sunk); }
  .chat-body::-webkit-scrollbar{ width:0; }
  .intake-label{ display:flex; align-items:center; gap:7px; font-family:var(--font-display); font-weight:700; font-size:14px; color:var(--text); margin-bottom:9px; }
  .intake-label svg{ color:var(--ocean); }
  .partner-compare{ margin-top:14px; padding:13px 15px; border:1px dashed var(--border-strong); border-radius:var(--r-md); background:var(--surface-sunk); }
  .partner-tag{ font-family:var(--font-mono,monospace); font-size:10px; color:var(--text-muted); background:var(--slate-100); padding:2px 7px; border-radius:99px; flex:none; }
  .partner-link{ display:inline-flex; align-items:center; gap:6px; margin-top:9px; font-family:var(--font-display); font-weight:700; font-size:13.5px; color:var(--ocean-700); text-decoration:none; }
  .partner-foot{ margin-top:7px; color:var(--text-muted); }
  .answer-dock{ flex:none; padding:14px 16px calc(16px + env(safe-area-inset-bottom)); background:var(--surface); border-top:1px solid var(--border); box-shadow:0 -8px 24px -16px rgba(15,23,42,.3); animation:fadeUp .3s ease both; }
  .free-dock{ flex:none; display:flex; align-items:center; gap:9px; padding:11px 14px calc(13px + env(safe-area-inset-bottom)); background:var(--surface); border-top:1px solid var(--border); }
  .free-dock input{ flex:1; min-width:0; border:1.5px solid var(--border-strong); border-radius:var(--r-pill); padding:12px 16px; font-family:var(--font-body); font-size:15px; font-weight:500; color:var(--text); background:var(--surface-sunk); outline:none; }
  .free-dock input:focus{ border-color:var(--ocean); box-shadow:0 0 0 4px var(--ring); }
  .free-send{ width:46px; height:46px; flex:none; border-radius:50%; border:none; background:var(--grad-ocean); color:#fff; display:grid; place-items:center; cursor:pointer; box-shadow:var(--sh-ocean); }
  .free-send:disabled{ opacity:.4; cursor:not-allowed; box-shadow:none; }
  .free-mic{ width:46px; height:46px; flex:none; border-radius:50%; border:none; background:var(--slate-100); color:var(--ocean-700); display:grid; place-items:center; cursor:pointer; position:relative; }
  .free-mic.on{ background:var(--coral); color:#fff; }
  .free-mic .mic-ping{ position:absolute; inset:-4px; border-radius:50%; border:2px solid var(--coral); animation:micPing 1.2s ease-out infinite; }
  @keyframes micPing{ 0%{ transform:scale(.85); opacity:.9; } 100%{ transform:scale(1.35); opacity:0; } }
  .over-tag{ display:inline-flex; align-items:center; gap:5px; font-family:var(--font-display); font-weight:700; font-size:11px; color:var(--warning); background:var(--warning-bg); border:1px solid var(--warning-border); padding:4px 10px; border-radius:99px; margin-bottom:8px; }
  /* ===== Bon plan du jour ===== */
  .bonplan-badge{ display:inline-flex; align-items:center; gap:5px; font-family:var(--font-display); font-weight:800; font-size:15px; color:var(--coral-700); }
  .bonplan-badge svg{ color:var(--gold); }
  .bonplan-card{ position:relative; flex:none; width:200px; scroll-snap-align:start; text-align:left; cursor:pointer; border:1px solid var(--border); border-radius:var(--r-lg); background:var(--surface); padding:14px; display:flex; flex-direction:column; gap:10px; box-shadow:var(--sh-xs); transition:transform .12s, border-color .15s, box-shadow .15s; }
  .bonplan-card:hover{ transform:translateY(-3px); border-color:var(--ocean); box-shadow:var(--sh-md); }
  .bonplan-card.is-hot{ border-color:var(--coral); background:linear-gradient(180deg, color-mix(in srgb, var(--coral) 7%, var(--surface)), var(--surface)); }
  .bonplan-disc{ position:absolute; top:0; right:0; font-family:var(--font-display); font-weight:800; font-size:12px; color:#fff; background:linear-gradient(135deg,var(--coral),var(--coral-700)); padding:4px 10px; border-radius:0 var(--r-lg) 0 12px; }
  .bonplan-top{ display:flex; flex-direction:column; gap:1px; }
  .bonplan-dest{ font-family:var(--font-display); font-weight:700; font-size:17px; color:var(--text); }
  .bonplan-country{ font-size:12px; color:var(--text-2); }
  .bonplan-mid{ display:flex; flex-direction:column; gap:3px; }
  .bonplan-bot{ display:flex; align-items:flex-end; justify-content:space-between; margin-top:2px; }
  .bonplan-price{ display:block; font-family:var(--font-display); font-weight:800; font-size:22px; color:var(--ocean-700); line-height:1; margin-top:2px; }
  [data-theme="dark"] .bonplan-card{ color:var(--text); }
  [data-theme="dark"] .bonplan-price{ color:#5BB0FF; }
  [data-theme="dark"] .bonplan-card.is-hot{ background:linear-gradient(180deg, color-mix(in srgb, var(--coral) 16%, var(--surface)), var(--surface)); }
  .bonplan-go{ width:34px; height:34px; border-radius:50%; background:var(--grad-ocean); color:#fff; display:grid; place-items:center; flex:none; }
  .bonplan-origin{ display:inline-flex; align-items:center; gap:8px; padding:8px 12px; border:1px solid var(--border); border-radius:var(--r-pill); background:var(--surface); color:var(--text-2); }
  .bonplan-origin svg{ color:var(--ocean); }
  .bonplan-origin select{ border:none; background:none; font-family:var(--font-display); font-weight:700; font-size:14px; color:var(--text); cursor:pointer; outline:none; padding-right:2px; }
  .bonplan-origin select option{ color:#10203A; background:#FFFFFF; }
  [data-theme="dark"] .bonplan-origin select option{ color:#EAF1FF; background:#16223A; }
  /* ===== Package intelligent ===== */
  .vols-route{ display:flex; align-items:center; gap:8px; padding:10px 12px; border:1px solid var(--border); border-radius:var(--r-md); background:var(--surface-sunk); font-size:13.5px; color:var(--text); }
  .vols-route svg{ color:var(--ocean); flex:none; }
  .pkg-pax{ display:flex; flex-direction:column; gap:8px; margin-top:12px; }
  .pkg-pax-row{ display:flex; align-items:center; justify-content:space-between; padding:8px 12px; border:1px solid var(--border); border-radius:var(--r-md); background:var(--surface-sunk); }
  .pkg-pax-row > span{ font-family:var(--font-display); font-weight:600; font-size:14px; color:var(--text); }
  .pkg-step{ display:flex; align-items:center; gap:14px; }

  /* immersive "Webbina parle" stage — avatar + caption synced to her voice */

  .devis-title{ font-family:var(--font-display); font-weight:700; font-size:15px; color:var(--text); }
  .devis-lines{ display:flex; flex-direction:column; gap:2px; }

  .dl-ic{ width:32px; height:32px; border-radius:9px; background:var(--ocean-50); color:var(--ocean-700); display:grid; place-items:center; flex:none; }
  [data-theme="dark"] .dl-ic{ background:color-mix(in srgb, var(--ocean) 22%, transparent); color:#7BC0FF; }
  .dl-txt{ flex:1; min-width:0; } .dl-txt b{ font-family:var(--font-display); font-size:13.5px; display:block; }

  .devis-total span{ font-family:var(--font-display); font-weight:600; color:var(--text-2); }
  .devis-total b{ font-family:var(--font-display); font-weight:800; font-size:20px; color:var(--text); }
  .fb-list{ display:flex; flex-direction:column; gap:8px; }
  .fb-card{ position:relative; text-align:left; border:1.5px solid var(--border); background:var(--surface-sunk); border-radius:var(--r-md); padding:11px 12px; cursor:pointer; transition:border-color .15s, transform .1s; }
  .fb-card:hover{ border-color:var(--ocean); } .fb-card:active{ transform:scale(.99); }
  .fb-card.best{ border-color:var(--ocean); background:var(--ocean-50); padding-top:22px; }
  .fb-best{ position:absolute; top:0; left:0; display:inline-flex; align-items:center; gap:3px; font-family:var(--font-display); font-weight:700; font-size:10px; color:#fff; background:var(--grad-ocean); padding:3px 9px; border-radius:0 0 9px 0; }
  .fb-logo{ width:34px; height:34px; border-radius:9px; background:var(--marine); color:#fff; display:grid; place-items:center; font-family:var(--font-display); font-weight:700; font-size:12px; flex:none; }
  /* live weather widget */

  /* ===== "Sur place" universes ===== */

  .webbina-reco{ display:flex; gap:9px; align-items:flex-start; background:var(--surface-sunk); border:1px dashed var(--border-strong); border-radius:var(--r-md); padding:10px 12px; }

  .act-card{ flex:none; width:172px; scroll-snap-align:start; background:var(--surface); border:1px solid var(--border); border-radius:var(--r-lg); overflow:hidden; box-shadow:var(--sh-xs); }

  .act-body{ padding:10px 11px 12px; }

  .uni-card{ flex:none; width:186px; scroll-snap-align:start; background:var(--surface); border:1px solid var(--border); border-radius:var(--r-lg); overflow:hidden; box-shadow:var(--sh-xs); }
  .uni-card-top{ height:64px; display:flex; align-items:flex-start; justify-content:flex-end; padding:8px; position:relative; }

  .uni-card-top.u-turq{ background:linear-gradient(135deg,var(--turq),var(--turq-700)); }
  .uni-card-top.u-coral{ background:linear-gradient(135deg,var(--coral),var(--coral-700)); }
  .uni-card-top.u-gold{ background:linear-gradient(135deg,var(--gold),var(--gold-700)); }
  .uni-card-top :global(svg){ position:absolute; left:8px; top:8px; }
  .uni-badge{ font-family:var(--font-display); font-weight:700; font-size:10px; color:#fff; background:rgba(15,23,42,.32); padding:3px 8px; border-radius:99px; }
  .uni-card-body{ padding:10px 12px 12px; }
  .uni-cta{ font-family:var(--font-display); font-weight:700; font-size:12px; color:var(--ocean-700); background:var(--ocean-50); padding:5px 12px; border-radius:99px; }
  .uni-providers{ display:flex; align-items:center; gap:6px; flex-wrap:wrap; }
  .uni-prov{ font-family:var(--font-display); font-weight:600; font-size:11px; color:var(--text-2); background:var(--slate-100); padding:4px 9px; border-radius:99px; }
  /* ===== Booking flow ===== */
  .test-badge{ font-family:var(--font-display); font-weight:800; font-size:10px; letter-spacing:.06em; color:#fff; background:var(--gold); padding:4px 9px; border-radius:99px; flex:none; }

  .bk-step{ display:flex; align-items:center; gap:6px; opacity:.45; }

  .bk-dot{ width:24px; height:24px; border-radius:50%; background:var(--slate-200); color:var(--text-2); display:grid; place-items:center; font-family:var(--font-display); font-weight:700; font-size:12px; }
  .bk-step.on .bk-dot{ background:var(--grad-ocean); color:#fff; }

  .bk-field{ display:flex; flex-direction:column; gap:5px; }
  .bk-field span{ font-family:var(--font-display); font-weight:600; font-size:12px; color:var(--text-2); }

  .airline-logo{ width:42px; height:42px; border-radius:12px; background:var(--ocean-50); color:var(--ocean-700); display:grid; place-items:center; font-family:var(--font-display); font-weight:800; font-size:15px; flex:none; }

  .perk{ display:inline-flex; align-items:center; gap:5px; font-size:12px; font-weight:600; color:var(--text-2); background:var(--slate-100); border-radius:99px; padding:5px 10px; }

  /* ===== TIMELINE ===== */
  .timeline{ display:flex; flex-direction:column; gap:14px; }

  .tl-dayhead{ display:flex; align-items:center; gap:10px; margin-bottom:10px; }
  .tl-daynum{ width:38px; height:38px; border-radius:11px; background:var(--grad-ocean); color:#fff; display:grid; place-items:center; font-family:var(--font-display); font-weight:800; font-size:14px; flex:none; }
  .weather{ display:inline-flex; align-items:center; gap:4px; font-family:var(--font-display); font-weight:700; font-size:14px; color:var(--text-2); }

  /* ===== DASHBOARD ===== */

  .mem-ic{ width:38px; height:38px; border-radius:11px; background:var(--slate-100); color:var(--ocean-700); display:grid; place-items:center; flex:none; }

  /* ===== TABBAR ===== */
  .tabbar{ flex:none; display:flex; align-items:flex-end; justify-content:space-around; gap:2px; padding:8px 10px calc(12px + env(safe-area-inset-bottom)); background:var(--surface); border-top:1px solid var(--border); position:relative; z-index:45; }
  .tab{ flex:1; display:flex; flex-direction:column; align-items:center; gap:3px; border:none; background:none; cursor:pointer; color:var(--text-muted); font-family:var(--font-display); font-weight:600; font-size:11px; padding:4px 0; }
  .tab.on{ color:var(--ocean); }
  .tab-fab{ flex:none; margin-top:-30px; width:62px; height:62px; border-radius:50%; border:4px solid var(--surface); background:var(--grad-ocean); cursor:pointer; box-shadow:var(--sh-ocean); overflow:hidden; padding:0; animation:fabPulse 3.6s ease-in-out infinite; }
  .tab-fab img{ width:100%; height:100%; object-fit:cover; transform-origin:50% 46%; animation:faceLive 4.4s ease-in-out infinite; }
  @keyframes fabPulse{ 0%,100%{ box-shadow:0 16px 34px -12px rgba(37,99,235,.42), 0 0 0 0 rgba(37,99,235,.35); } 50%{ box-shadow:0 16px 34px -12px rgba(37,99,235,.5), 0 0 0 7px rgba(37,99,235,0); } }
  .tab-fab-wrap{ flex:none; margin-top:-30px; }

  /* ===== LIVING WEBBINA (breathing/blink/sway, reusable) ===== */
  .lwb{ position:relative; display:grid; place-items:center; border:none; background:none; padding:0; cursor:default; }
  .lwb[aria-label]{ cursor:pointer; }
  .lwb-aura{ position:absolute; inset:4%; border-radius:50%; filter:blur(7px); opacity:.7; pointer-events:none;
    background:radial-gradient(circle, rgba(56,150,255,.5), transparent 66%); animation:lwbAura 3.4s ease-in-out infinite; }
  .lwb.emo-coral .lwb-aura, .lwb.state-speaking .lwb-aura{ background:radial-gradient(circle, rgba(255,122,89,.45), transparent 66%); }
  .lwb.state-listening .lwb-aura{ animation-duration:1.6s; background:radial-gradient(circle, rgba(6,182,212,.5), transparent 66%); }
  .lwb.state-speaking .lwb-aura{ animation-duration:1s; }
  @keyframes lwbAura{ 0%,100%{ transform:scale(.95); opacity:.6; } 50%{ transform:scale(1.07); opacity:1; } }
  .lwb-ring{ position:absolute; inset:1%; border-radius:50%; z-index:1; pointer-events:none;
    background:conic-gradient(from 0deg, transparent, rgba(120,200,255,.55), transparent 55%);
    -webkit-mask:radial-gradient(circle, transparent 46%, #000 47%, #000 50%, transparent 51%);
            mask:radial-gradient(circle, transparent 46%, #000 47%, #000 50%, transparent 51%);
    animation:lwbRing 9s linear infinite; opacity:.55; }
  .lwb.state-thinking .lwb-ring{ animation-duration:3.4s; opacity:.9; }
  .lwb.state-listening .lwb-ring{ animation-duration:5s; }
  .lwb--ring .lwb-ring{ opacity:.7; }
  @keyframes lwbRing{ to{ transform:rotate(360deg); } }
  .lwb-body{ position:relative; z-index:2; width:84%; height:84%; border-radius:50%; overflow:hidden;
    border:3px solid #fff; box-shadow:0 10px 24px -10px rgba(0,0,0,.5); transform-origin:50% 60%;
    transform:translate(var(--tx,0), var(--ty,0)) rotate(var(--rot,0)) scaleY(var(--sy,1)); }
  .lwb-body img{ width:100%; height:100%; object-fit:cover; display:block; }
  .lwb-lid{ position:absolute; z-index:3; left:-4%; right:-4%; top:21%; height:20%; pointer-events:none; filter:blur(.6px);
    background:linear-gradient(180deg, rgba(206,160,112,0) 0%, rgba(208,162,114,.96) 40%, rgba(214,170,120,.98) 60%, rgba(206,160,112,0) 100%);
    transform-origin:50% 50%; transform:scaleY(var(--blink,0)); opacity:calc(var(--blink,0) * .96); }
  .lwb-wave{ position:absolute; z-index:4; bottom:5%; left:50%; transform:translateX(-50%); display:flex; gap:3px; align-items:flex-end; height:16px; }
  .lwb-wave i{ width:3px; height:6px; border-radius:3px; background:var(--turq); animation:lwbWave .6s ease-in-out infinite; }
  .lwb-wave i:nth-child(2){ animation-delay:.08s; } .lwb-wave i:nth-child(3){ animation-delay:.16s; } .lwb-wave i:nth-child(4){ animation-delay:.24s; }
  @keyframes lwbWave{ 0%,100%{ height:5px; } 50%{ height:15px; } }
  .lwb-confetti{ position:absolute; inset:-10% -10% 0 -10%; z-index:5; pointer-events:none; overflow:hidden; }
  .lwb-confetti i{ position:absolute; top:-10%; width:6px; height:9px; border-radius:2px; animation:lwbConf 1.5s ease-in forwards; }
  @keyframes lwbConf{ 0%{ transform:translateY(0) rotate(0); opacity:0; } 12%{ opacity:1; } 100%{ transform:translateY(160px) rotate(420deg); opacity:0; } }

  /* stage tools */
  .stage-tools{ position:fixed; top:18px; right:18px; display:flex; gap:8px; z-index:100; }
  .stage-tools button{ height:40px; padding:0 16px; border-radius:var(--r-pill); border:1px solid var(--border-strong); background:var(--surface); color:var(--text); font-family:var(--font-display); font-weight:600; font-size:13px; display:flex; align-items:center; gap:7px; cursor:pointer; box-shadow:var(--sh-sm); }
  .stage-cap{ position:fixed; left:50%; bottom:14px; transform:translateX(-50%); z-index:100; font-family:var(--font-body); font-size:12.5px; color:var(--text-muted); background:var(--surface); border:1px solid var(--border); border-radius:var(--r-pill); padding:7px 16px; box-shadow:var(--sh-sm); }

  @media (max-width:440px){
    body{ padding:0; }
    .device-frame{ border-radius:0; padding:0; box-shadow:none; width:100%; }
    .notch{ display:none; }
    .phone-screen{ border-radius:0; height:100vh; }
    .stage-tools{ top:auto; bottom:84px; right:12px; }
    .stage-cap{ display:none; }
  }
</style>
