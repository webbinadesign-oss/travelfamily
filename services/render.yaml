# Render.com Blueprint — deploys the Webbina backend as a Web Service.
# How to use (no terminal): push this repo to GitHub, then on render.com →
# "New +" → "Blueprint" → pick your repo. Render reads this file.
# Fill the secret env vars in the Render dashboard (NEVER commit real keys).
services:
  - type: web
    name: webbina-backend
    runtime: node
    rootDir: services
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      # The browser app origins allowed to call this backend (comma-separated).
      # Put the address where you open Webbina Console / Prototype.
      - key: CORS_ORIGINS
        sync: false
      # ── Secrets: set these in the Render dashboard, not here ──
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      - key: ELEVENLABS_API_KEY
        sync: false
      - key: ELEVENLABS_AGENT_ID
        value: agent_0001kt43rqqte7ks86mzvavmacjs
      - key: ELEVENLABS_VOICE_ID
        sync: false
      # Optional — leave unset until you have them (routes return 503 gracefully)
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: AMADEUS_API_KEY
        sync: false
      - key: AMADEUS_API_SECRET
        sync: false
      - key: GOOGLE_CLOUD_API_KEY
        sync: false
      - key: OPENWEATHER_API_KEY
        sync: false
