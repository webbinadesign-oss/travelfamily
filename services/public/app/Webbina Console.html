<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>TravelFamily.AI — Webbina Console</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&family=Mulish:ital,wght@0,400;0,500;0,600;0,700;0,800;1,500&family=Caveat:wght@500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="assets/ds.css" />
<style>
  html, body { height: 100%; }
  body { margin: 0; background:
      radial-gradient(120% 80% at 0% 0%, #EAF2FF 0%, transparent 45%),
      radial-gradient(120% 80% at 100% 0%, #E6FBFF 0%, transparent 42%), #EDF1F7; }
  [data-theme="dark"] body { background: radial-gradient(120% 80% at 0% 0%, #14233E 0%, transparent 45%), #070C16; }
  #app { height: 100%; }

  .wc-shell { height: 100vh; display: flex; flex-direction: column; }

  /* header */
  .wc-header { display: flex; align-items: center; gap: 18px; padding: 12px 20px; background: var(--surface);
    border-bottom: 1px solid var(--border); flex: none; }
  .brandmark { display: flex; align-items: center; gap: 9px; }
  .brandmark img { height: 30px; }
  .brandmark .wm { font-family: var(--font-display); font-weight: 700; font-size: 17px; letter-spacing: -.02em; color: var(--marine); }
  .brandmark .wm b { color: var(--turq-600); }
  [data-theme="dark"] .brandmark .wm { color: #fff; }
  .wc-tabs { display: flex; gap: 4px; margin-left: 8px; background: var(--slate-100); padding: 4px; border-radius: var(--r-pill); }
  .wc-tabs button { border: none; background: none; cursor: pointer; font-family: var(--font-display); font-weight: 600; font-size: 14px;
    color: var(--text-2); padding: 8px 16px; border-radius: var(--r-pill); }
  .wc-tabs button.on { background: var(--surface); color: var(--ocean); box-shadow: var(--sh-xs); }
  .wc-agent { margin-left: auto; display: flex; align-items: center; gap: 7px; font-size: 12.5px; color: var(--text-2);
    font-family: var(--font-display); font-weight: 600; background: var(--ocean-50); padding: 7px 13px; border-radius: var(--r-pill); }
  .wc-agent code { font-family: var(--font-body); font-size: 11.5px; }
  .agent-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--success); box-shadow: 0 0 0 3px color-mix(in srgb, var(--success) 25%, transparent); }

  /* ── Connexion backend panel ──────────────────────────────── */
  .wc-head-right { margin-left: auto; display: flex; align-items: center; gap: 10px; }
  .cx-wrap { position: relative; }
  .cx-btn { display: inline-flex; align-items: center; gap: 7px; cursor: pointer; font-family: var(--font-display); font-weight: 600; font-size: 12.5px;
    color: var(--text-2); background: var(--slate-100); border: 1px solid var(--border); padding: 8px 13px; border-radius: var(--r-pill); }
  .cx-btn.cx-on { color: var(--success); background: var(--success-bg); border-color: var(--success-border); }
  .cx-pop { position: absolute; top: calc(100% + 10px); right: 0; z-index: 50; width: 320px; background: var(--surface);
    border: 1px solid var(--border); border-radius: var(--r-lg); box-shadow: var(--sh-lg); padding: 18px; }
  .cx-pop b { font-family: var(--font-display); font-size: 15px; }
  .cx-pop p { font-size: 12.5px; color: var(--text-2); margin: 5px 0 12px; line-height: 1.45; }
  .cx-pop code { font-family: var(--font-body); background: var(--slate-100); padding: 1px 5px; border-radius: 5px; font-size: 11.5px; }
  .cx-input { width: 100%; border: 1.5px solid var(--border-strong); border-radius: var(--r-md); padding: 11px 13px; font-family: var(--font-body);
    font-size: 13.5px; color: var(--text); background: var(--bg); outline: none; box-sizing: border-box; }
  .cx-input:focus { border-color: var(--ocean); box-shadow: 0 0 0 4px var(--ring); }
  .cx-row { display: flex; gap: 8px; margin-top: 10px; }
  .cx-test, .cx-connect { flex: 1; cursor: pointer; font-family: var(--font-display); font-weight: 600; font-size: 13px; padding: 10px; border-radius: var(--r-pill); border: none; }
  .cx-test { background: var(--slate-100); color: var(--text-2); }
  .cx-connect { background: var(--grad-ocean); color: #fff; box-shadow: var(--sh-ocean); }
  .cx-status { margin-top: 11px; font-size: 12.5px; color: var(--text-2); }
  .cx-status.cx-err { color: var(--error); }
  .cx-status.cx-ok { color: var(--success); }
  .cx-ints { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 7px; }
  .cx-ints span { font-size: 10.5px; font-family: var(--font-display); font-weight: 600; padding: 3px 8px; border-radius: var(--r-pill);
    background: var(--slate-100); color: var(--text-muted); text-transform: capitalize; }
  .cx-ints span.on { background: var(--success-bg); color: var(--success); }
  .cx-hint { margin-top: 12px; padding-top: 11px; border-top: 1px solid var(--border); font-size: 11.5px; color: var(--text-muted); line-height: 1.45; }

  /* ── Auth (Supabase) ──────────────────────────────────────── */
  .auth-wrap { position: relative; }
  .auth-chip { display: inline-flex; align-items: center; gap: 7px; cursor: pointer; font-family: var(--font-display); font-weight: 600;
    font-size: 12.5px; padding: 7px 13px; border-radius: var(--r-pill); border: 1px solid var(--border); background: var(--slate-100); color: var(--text-2); }
  .auth-chip.auth-cta { background: var(--grad-ocean); color: #fff; border: none; box-shadow: var(--sh-ocean); }
  .auth-chip.auth-off { cursor: default; color: var(--text-muted); }
  .auth-chip.auth-in { padding-left: 5px; }
  .auth-avatar { width: 24px; height: 24px; border-radius: 50%; background: var(--grad-ocean); color: #fff; display: grid; place-items: center; font-size: 12px; }
  .auth-email { max-width: 150px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .auth-pop { position: absolute; top: calc(100% + 10px); right: 0; z-index: 50; width: 230px; background: var(--surface);
    border: 1px solid var(--border); border-radius: var(--r-lg); box-shadow: var(--sh-lg); padding: 16px; }
  .auth-pop b { font-family: var(--font-display); font-size: 14px; } .auth-pop p { font-size: 12.5px; color: var(--text-2); margin: 4px 0 12px; word-break: break-all; }
  .auth-out { width: 100%; cursor: pointer; font-family: var(--font-display); font-weight: 600; font-size: 13px; padding: 9px; border-radius: var(--r-pill); border: 1px solid var(--border-strong); background: var(--surface); color: var(--error); }
  .auth-modal-bg { position: fixed; inset: 0; z-index: 200; background: rgba(11,26,51,.5); backdrop-filter: blur(3px); display: grid; place-items: center; padding: 20px; }
  .auth-modal { width: 100%; max-width: 380px; background: var(--surface); border-radius: var(--r-xl); box-shadow: var(--sh-lg); padding: 26px; display: flex; flex-direction: column; gap: 13px; }
  .auth-modal-head { display: flex; align-items: center; gap: 13px; }
  .auth-modal-head img { width: 50px; height: 50px; border-radius: 50%; border: 2px solid #fff; box-shadow: var(--sh-xs); }
  .auth-modal-head b { font-family: var(--font-display); font-size: 18px; display: block; }
  .auth-modal-head span { font-size: 12.5px; color: var(--text-2); }
  .auth-modal label { display: flex; flex-direction: column; gap: 5px; font-family: var(--font-display); font-weight: 600; font-size: 12.5px; color: var(--text-2); }
  .auth-modal input { border: 1.5px solid var(--border-strong); border-radius: var(--r-md); padding: 12px 14px; font-family: var(--font-body); font-size: 14.5px; color: var(--text); background: var(--bg); outline: none; }
  .auth-modal input:focus { border-color: var(--ocean); box-shadow: 0 0 0 4px var(--ring); }
  .auth-submit { margin-top: 4px; cursor: pointer; font-family: var(--font-display); font-weight: 700; font-size: 15px; padding: 13px; border-radius: var(--r-pill); border: none; background: var(--grad-ocean); color: #fff; box-shadow: var(--sh-ocean); }
  .auth-submit:disabled { opacity: .6; }
  .auth-switch { text-align: center; font-size: 12.5px; color: var(--text-2); }
  .auth-switch button { background: none; border: none; color: var(--ocean); font-family: var(--font-display); font-weight: 600; cursor: pointer; font-size: 12.5px; }
  .auth-msg { font-size: 12.5px; padding: 9px 12px; border-radius: var(--r-md); }
  .auth-msg.ok { background: var(--success-bg); color: var(--success); }
  .auth-msg.err { background: var(--error-bg, #FEECEC); color: var(--error); }

  /* main two-column */
  .wc-main { flex: 1; min-height: 0; display: grid; grid-template-columns: minmax(0, 1fr) minmax(0, 1.05fr); }
  .wc-stage-col { min-width: 0; border-right: 1px solid var(--border); }
  .wc-convo-col { min-width: 0; display: flex; }
  .wc-main--arch { display: block; overflow-y: auto; }

  /* ── Avatar Stage ───────────────────────────────────────── */
  .stage { position: relative; height: 100%; overflow: hidden; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 16px;
    background: radial-gradient(120% 75% at 50% 26%, #16335E 0%, #0B1A33 46%, #070C16 82%); }
  .stage-bg { position: absolute; inset: 0; background:
      radial-gradient(55% 40% at 50% 34%, rgba(37,99,235,.35), transparent 70%),
      radial-gradient(42% 32% at 70% 22%, rgba(6,182,212,.26), transparent 70%); }
  .stage-particles { position: absolute; inset: 0; pointer-events: none; }
  .stage-particles span { position: absolute; bottom: -8px; width: 5px; height: 5px; border-radius: 50%;
    background: rgba(173,216,255,.8); box-shadow: 0 0 8px rgba(120,200,255,.9); animation: rise linear infinite; }
  @keyframes rise { 0% { transform: translateY(0) scale(.6); opacity: 0; } 12% { opacity: .9; } 100% { transform: translateY(-440px) scale(1.1); opacity: 0; } }

  .stage-avatar { position: relative; z-index: 2; }
  /* renderer output */
  .wv-avatar { position: relative; display: grid; place-items: center; }
  .wv-aura { position: absolute; inset: 6%; border-radius: 50%; filter: blur(8px); opacity: .8;
    background: radial-gradient(circle, rgba(56,150,255,.5), transparent 66%); animation: auraPulse 3.4s ease-in-out infinite; }
  .wv-aura--turq { background: radial-gradient(circle, rgba(6,182,212,.5), transparent 66%); }
  .wv-aura--coral { background: radial-gradient(circle, rgba(255,122,89,.45), transparent 66%); }
  .wv-aura--gold { background: radial-gradient(circle, rgba(212,175,55,.5), transparent 66%); }
  .wv-aura.listening { animation-duration: 1.6s; }
  .wv-aura.speaking { animation-duration: 1s; }
  @keyframes auraPulse { 0%,100% { transform: scale(.95); opacity: .65; } 50% { transform: scale(1.08); opacity: 1; } }
  .wv-portrait { position: relative; z-index: 2; width: 100%; height: 100%; object-fit: cover; border-radius: 50%; display: block; }
  /* living body: JS writes --tx/--ty/--rot/--sx/--sy each frame */
  .wv-body { position: relative; z-index: 2; width: 84%; height: 84%; border-radius: 50%; overflow: hidden;
    border: 4px solid rgba(255,255,255,.9); box-shadow: 0 18px 40px -16px rgba(0,0,0,.6);
    transform-origin: 50% 62%;
    transform: translate(var(--tx,0), var(--ty,0)) rotate(var(--rot,0)) scale(var(--sx,1), var(--sy,1)); }
  /* eyelid shutter — feathered band over the eye line (~31% from top) */
  .wv-lid { position: absolute; z-index: 3; left: -4%; right: -4%; top: 22%; height: 20%;
    background: linear-gradient(180deg, rgba(196,150,104,0) 0%, rgba(206,160,112,.96) 38%, rgba(214,170,120,.98) 62%, rgba(196,150,104,0) 100%);
    filter: blur(1px); transform-origin: 50% 50%;
    transform: scaleY(var(--blink,0)); opacity: calc(var(--blink,0) * .96); pointer-events: none; }
  .emo-surprised .wv-lid, .emo-enthusiastic .wv-lid, .emo-celebrate .wv-lid { top: 20%; }
  /* soft rotating presence ring */
  .wv-ring { position: absolute; inset: 2%; border-radius: 50%; z-index: 1; pointer-events: none;
    background: conic-gradient(from 0deg, transparent, rgba(120,200,255,.5), transparent 55%);
    -webkit-mask: radial-gradient(circle, transparent 47%, #000 48%, #000 50%, transparent 51%);
            mask: radial-gradient(circle, transparent 47%, #000 48%, #000 50%, transparent 51%);
    animation: ringSpin 9s linear infinite; opacity: .6; }
  .living.state-thinking .wv-ring { animation-duration: 3.4s; opacity: .9; }
  .living.state-listening .wv-ring { animation-duration: 5s; }
  @keyframes ringSpin { to { transform: rotate(360deg); } }
  /* celebration confetti */
  .wv-confetti { position: absolute; inset: -6% -6% 0 -6%; z-index: 5; pointer-events: none; overflow: hidden; }
  .wv-confetti span { position: absolute; top: -8%; width: 8px; height: 12px; border-radius: 2px;
    animation: confFall 1.5s ease-in forwards; }
  @keyframes confFall { 0% { transform: translateY(0) rotate(0); opacity: 0; } 12% { opacity: 1; }
    100% { transform: translateY(280px) rotate(420deg); opacity: 0; } }
  .wv-wave { position: absolute; z-index: 3; bottom: 4%; left: 50%; transform: translateX(-50%); display: flex; gap: 4px; align-items: flex-end; height: 22px; }
  .wv-wave span { width: 4px; height: 8px; border-radius: 4px; background: var(--turq); animation: wave .6s ease-in-out infinite; }
  @keyframes wave { 0%,100% { height: 6px; } 50% { height: 20px; } }
  .wv-soon .wv-ghost { filter: grayscale(.5) brightness(.7); opacity: .5; }
  .wv-soon-badge { position: absolute; z-index: 4; inset: auto 0 14% 0; text-align: center; color: #fff; }
  .wv-soon-badge b { display: block; font-family: var(--font-display); font-size: 18px; }
  .wv-soon-badge span { display: block; font-size: 12px; opacity: .8; margin: 4px 14px 0; }
  .wv-soon-badge em { display: inline-block; margin-top: 8px; font-style: normal; font-size: 11px; font-family: var(--font-body);
    background: rgba(255,255,255,.12); border: 1px solid rgba(255,255,255,.22); padding: 4px 10px; border-radius: 99px; }

  .stage-readouts { position: relative; z-index: 2; display: flex; gap: 10px; }
  .stage-state, .stage-emotion { display: inline-flex; align-items: center; gap: 7px; font-family: var(--font-display); font-weight: 600; font-size: 13px;
    padding: 7px 14px; border-radius: var(--r-pill); background: rgba(255,255,255,.1); border: 1px solid rgba(255,255,255,.18); color: #fff; backdrop-filter: blur(8px); }
  .state-dot { width: 8px; height: 8px; border-radius: 50%; }
  .stage-emotion.emo-coral { color: #FFD9CC; } .stage-emotion.emo-turq { color: #C5F4FC; }
  .stage-emotion.emo-gold { color: #F4E4A8; } .stage-emotion.emo-ocean { color: #C9DCFF; }

  /* context director strip */
  .ctx-strip { position: relative; z-index: 2; display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; max-width: 94%; }
  .ctx-btn { display: inline-flex; align-items: center; gap: 6px; cursor: pointer; font-family: var(--font-display); font-weight: 600; font-size: 12px;
    color: rgba(255,255,255,.7); background: rgba(255,255,255,.06); border: 1px solid rgba(255,255,255,.14); padding: 6px 11px; border-radius: var(--r-pill); }
  .ctx-btn.on { background: var(--turq); color: #06202a; border-color: var(--turq); }

  .renderer-switch { position: relative; z-index: 2; display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; max-width: 92%; }
  .rs-btn { display: inline-flex; align-items: center; gap: 6px; cursor: pointer; font-family: var(--font-display); font-weight: 600; font-size: 12px;
    color: rgba(255,255,255,.78); background: rgba(255,255,255,.08); border: 1px solid rgba(255,255,255,.16); padding: 7px 12px; border-radius: var(--r-pill); }
  .rs-btn.on { background: #fff; color: var(--marine); border-color: #fff; }
  .rs-soon { font-style: normal; font-size: 9.5px; background: var(--gold); color: #4a3a06; padding: 1px 6px; border-radius: 99px; font-family: var(--font-body); font-weight: 700; }

  /* ── Conversation ───────────────────────────────────────── */
  .convo { flex: 1; min-width: 0; display: flex; flex-direction: column; background: var(--bg); }
  .convo-top { display: flex; align-items: center; gap: 12px; padding: 12px 18px; background: var(--surface); border-bottom: 1px solid var(--border); flex-wrap: wrap; }
  .convo-id { display: flex; align-items: center; gap: 10px; }
  .convo-ava { width: 42px; height: 42px; border-radius: 50%; border: 2px solid #fff; box-shadow: var(--sh-xs); }
  .convo-id b { font-family: var(--font-display); font-size: 16px; }
  .convo-status { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text-2); }
  .s-dot { width: 8px; height: 8px; border-radius: 50%; } .s-dot.ok { background: var(--success); } .s-dot.off { background: var(--slate-300); }
  .transport-switch { margin-left: auto; display: flex; gap: 4px; background: var(--slate-100); padding: 4px; border-radius: var(--r-pill); }
  .tr-btn { display: inline-flex; align-items: center; gap: 6px; border: none; background: none; cursor: pointer; font-family: var(--font-display);
    font-weight: 600; font-size: 12px; color: var(--text-2); padding: 7px 12px; border-radius: var(--r-pill); }
  .tr-btn.on { background: var(--surface); color: var(--ocean); box-shadow: var(--sh-xs); }

  .convo-error { display: flex; align-items: center; gap: 8px; margin: 10px 16px 0; padding: 10px 14px; border-radius: var(--r-md);
    background: var(--warning-bg); color: var(--warning); border: 1px solid var(--warning-border); font-size: 13px; }

  .convo-body { flex: 1; overflow-y: auto; padding: 18px 16px; display: flex; flex-direction: column; gap: 12px; }
  .row-w, .row-u { display: flex; gap: 10px; align-items: flex-end; max-width: 88%; }
  .row-u { align-self: flex-end; flex-direction: row-reverse; }
  .msg-ava { width: 34px; height: 34px; border-radius: 50%; border: 2px solid #fff; box-shadow: var(--sh-xs); flex: none; }
  .bub { padding: 13px 17px; border-radius: var(--r-lg); font-size: 15.5px; line-height: 1.5; }
  .bub-w { background: var(--surface); border: 1px solid var(--border); border-bottom-left-radius: 6px; box-shadow: var(--sh-xs); }
  .bub-u { background: var(--grad-ocean); color: #fff; border-bottom-right-radius: 6px; box-shadow: var(--sh-ocean); }
  .cursor { display: inline-block; width: 8px; height: 17px; background: var(--ocean); margin-left: 2px; vertical-align: -2px; animation: blink 1s steps(1) infinite; border-radius: 1px; }
  @keyframes blink { 0%,50% { opacity: 1; } 51%,100% { opacity: 0; } }
  .typing3 { display: inline-flex; gap: 5px; }
  .typing3 span { width: 8px; height: 8px; border-radius: 50%; background: var(--slate-300); animation: t3 1.2s infinite ease-in-out; }
  .typing3 span:nth-child(2) { animation-delay: .18s; } .typing3 span:nth-child(3) { animation-delay: .36s; }
  @keyframes t3 { 0%,60%,100% { transform: translateY(0); opacity: .5; } 30% { transform: translateY(-6px); opacity: 1; } }

  .convo-suggest { display: flex; gap: 8px; flex-wrap: wrap; padding: 0 16px 8px; }
  .sg { border: 1.5px solid var(--border-strong); background: var(--ocean-50); color: var(--ocean-700); border-radius: var(--r-pill);
    padding: 9px 15px; font-family: var(--font-display); font-weight: 600; font-size: 14px; cursor: pointer; }
  .sg:hover { border-color: var(--ocean); }

  .convo-input { display: flex; align-items: center; gap: 10px; padding: 12px 16px calc(14px + env(safe-area-inset-bottom)); background: var(--surface); border-top: 1px solid var(--border); }
  .convo-input input { flex: 1; min-width: 0; border: 1.5px solid var(--border-strong); border-radius: var(--r-pill); padding: 13px 18px; font-family: var(--font-body);
    font-size: 15.5px; font-weight: 500; color: var(--text); background: var(--bg); outline: none; }
  .convo-input input:focus { border-color: var(--ocean); box-shadow: 0 0 0 4px var(--ring); }
  .mic, .send { width: 48px; height: 48px; border-radius: 50%; border: none; cursor: pointer; display: grid; place-items: center; flex: none; }
  .mic { background: var(--slate-100); color: var(--ocean-700); }
  .mic.live { background: var(--coral); color: #fff; animation: micPulse 1.2s ease-in-out infinite; }
  @keyframes micPulse { 0%,100% { box-shadow: 0 0 0 0 rgba(255,122,89,.5); } 50% { box-shadow: 0 0 0 8px rgba(255,122,89,0); } }
  .send { background: var(--grad-ocean); color: #fff; box-shadow: var(--sh-ocean); }
  .send:disabled { opacity: .4; cursor: not-allowed; box-shadow: none; }

  /* ── Architecture ───────────────────────────────────────── */
  .arch { max-width: 1000px; margin: 0 auto; padding: 40px 24px 80px; }
  .arch-head { text-align: center; margin-bottom: 30px; }
  .arch-eyebrow { font-family: var(--font-display); font-weight: 600; font-size: 13px; letter-spacing: .14em; text-transform: uppercase; color: var(--accent-600); }
  .arch-head h2 { font-size: 32px; margin: 8px 0; }
  .arch-head p { color: var(--text-2); font-size: 17px; max-width: 60ch; margin: 0 auto; }
  .arch-flow { display: flex; flex-direction: column; align-items: center; gap: 0; }
  .arch-card { width: 100%; max-width: 640px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--r-lg);
    padding: 20px 22px; box-shadow: var(--sh-sm); border-top: 4px solid var(--ocean); }
  .arch-card.a-turq { border-top-color: var(--turq); } .arch-card.a-coral { border-top-color: var(--coral); }
  .arch-card.a-gold { border-top-color: var(--gold); } .arch-card.a-ocean { border-top-color: var(--ocean); }
  .arch-ic { width: 46px; height: 46px; border-radius: 13px; background: var(--ocean-50); color: var(--ocean-700); display: grid; place-items: center; margin-bottom: 10px; }
  .a-turq .arch-ic { background: var(--turq-50); color: var(--turq-700); } .a-coral .arch-ic { background: var(--coral-50); color: var(--coral-700); }
